# Reusable GitHub Actions workflow: Auto PR from based on pr branch hierarchy
# Automatically generates PRs with grouped release notes and appends updates

name: Auto PR from Development to Main

on:
  workflow_call:
    # Inputs required when calling this workflow
    inputs:
      pr-branch-hierarchy-json:
        type: string
        required: true

    # Secrets passed to the reusable workflow
    secrets:
      GH_TOKEN:
        required: true

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      PR_BRANCH_HIERARCHY_JSON: ${{ inputs.pr-branch-hierarchy-json }}

    steps:
      # STEP 1: Code checkout
      - name: Checkout code
        id: checkout-code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # STEP 2: Validate pr PR branch hierarchy JSON using jq
      - name: Validate PR branch hierarchy JSON
        id: validate-json
        run: |
          if ! echo "$PR_BRANCH_HIERARCHY_JSON" | jq empty > /dev/null 2>&1; then
            echo "::error ::PR_BRANCH_HIERARCHY_JSON is not valid JSON"
            exit 1
          fi

      # STEP 3: Determine the target base branch from the allowed hierarchy
      - name: Parse Branch Hierarchy JSON
        id: parse-json
        run: |
          BASE_BRANCH=""
          for key in $(echo "$PR_BRANCH_HIERARCHY_JSON" | jq -r 'keys[]'); do
            for child in $(echo "$PR_BRANCH_HIERARCHY_JSON" | jq -r ".[\"$key\"][]"); do
              if [[ "$GITHUB_REF_NAME" =~ ^$child$ ]]; then
                BASE_BRANCH="$key"
                break
              fi
            done
          done

          if [[ -z "$BASE_BRANCH" ]]; then
            echo "❌ This branch is not allowed to create PRs into any protected branch."
            exit 1
          fi

          echo "base_branch=$BASE_BRANCH" >> $GITHUB_OUTPUT

      # STEP 3.1: Check if base branch exists remotely
      - name: Ensure base branch exists on remote
        id: check-if-base-branch-exists
        run: |
          git ls-remote --exit-code --heads origin "${{ steps.parse-json.outputs.base_branch }}" || {
            echo "::error ::Base branch '${{ steps.parse-json.outputs.base_branch }}' does not exist on remote."
            exit 1
          }

      # STEP 3.2: check if auto-pr label exists else create
      - name: Ensure 'auto-pr' label exists
        id: check-for-auto-pr-label-else-create
        run: |
          LABEL_NAME="auto-pr"
          LABEL_COLOR="34ebba"
          LABEL_DESCRIPTION="Automatically generated PR"

          # Check if label exists
          if ! gh label list --json name | jq -e ".[] | select(.name == \"$LABEL_NAME\")" > /dev/null; then
            echo "Label '$LABEL_NAME' not found. Creating it..."
            gh label create "$LABEL_NAME" --color "$LABEL_COLOR" --description "$LABEL_DESCRIPTION"
          else
            echo "Label '$LABEL_NAME' already exists."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # STEP 4: Check if the current branch has new commits ahead of base
      - name: Check if branch is ahead of base
        id: check-diff
        run: |
          git fetch origin ${{ steps.parse-json.outputs.base_branch }}
          AHEAD=$(git rev-list origin/${{ steps.parse-json.outputs.base_branch }}..HEAD --count)
          echo "ahead_count=$AHEAD" >> $GITHUB_OUTPUT

          echo $GITHUB_OUTPUT

      # STEP 5: Check if an open PR already exists for this branch → base
      - name: Check for existing PR
        id: check-pr
        run: |
          PR_JSON=$(gh pr list --head "$GITHUB_REF_NAME" --base "${{ steps.parse-json.outputs.base_branch }}" --state open --json number --jq 'if length == 0 then "null" else .[0] end')
          if [[ "$PR_JSON" != "null" ]]; then
            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
          fi

          echo $GITHUB_OUTPUT

        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # STEP 6: Generate release notes grouped by commit type
      - name: Generate grouped release notes
        id: release_notes
        if: ${{ steps.check-diff.outputs.ahead_count != '0' }}
        run: |
          git fetch origin ${{ steps.parse-json.outputs.base_branch }}

          FEATURES=""
          FIXES=""
          HOTFIX=""
          CHORES=""
          OTHERS=""

          while IFS= read -r line; do
            IFS='~' read -r MSG AUTHOR <<< "$line"
            MSG=$(echo "$MSG" | xargs | sed 's/^[^a-zA-Z]*//')       # trim leading/trailing spaces
            AUTHOR=$(echo "$AUTHOR" | xargs) # trim leading/trailing spaces
            ENTRY="- ${MSG} (${AUTHOR})";

            # logs
            echo "line: $line";
            echo "msg: $MSG";
            echo "author: $AUTHOR";
            echo "entry: $ENTRY";
            echo "-------------------"

            [[ "$MSG" == feat:* ]] && FEATURES+="- $(echo "${MSG#feat:}" | xargs) (${AUTHOR})\n"
            [[ "$MSG" == fix:* ]] && FIXES+="- $(echo "${MSG#fix:}" | xargs) (${AUTHOR})\n"
            [[ "$MSG" == hotfix:* ]] && HOTFIX+="- $(echo "${MSG#hotfix:}" | xargs) (${AUTHOR})\n"
            [[ "$MSG" == chore:* ]] && CHORES+="- $(echo "${MSG#chore:}" | xargs) (${AUTHOR})\n"
            [[ "$MSG" == refactor:* ]] && CHORES+="- $(echo "${MSG#refactor:}" | xargs) (${AUTHOR})\n"
            [[ "$MSG" != feat:* && "$MSG" != fix:*  && "$MSG" != hotfix:* && "$MSG" != chore:* && "$MSG" != refactor:* ]] && OTHERS+="- $MSG (${AUTHOR})\n"
          done < <(git log origin/${{ steps.parse-json.outputs.base_branch }}..HEAD --pretty=format:"%s ~ %an")

          NOTES="## RELEASE NOTES:\n"
          [[ -n "$FEATURES" ]] && NOTES+="### ✨ FEATURES\n${FEATURES}\n---\n"
          [[ -n "$FIXES" ]]    && NOTES+="### 🐛 FIXES\n${FIXES}\n---\n"
          [[ -n "$HOTFIX" ]]   && NOTES+="### 🚑 HOTFIX\n${HOTFIX}\n---\n"
          [[ -n "$CHORES" ]]   && NOTES+="### 🔧 CHORES / Refactors\n${CHORES}\n---\n"
          [[ -n "$OTHERS" ]]   && NOTES+="### 📦 OTHERS\n${OTHERS}\n---\n"

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo $GITHUB_OUTPUT

      # STEP 7: Create PR if not already existing
      - name: Create PR
        if: steps.check-diff.outputs.ahead_count != '0' && steps.check-pr.outputs.pr_exists == 'false'
        run: |
          gh pr create \
            --base "${{ steps.parse-json.outputs.base_branch }}" \
            --head "$GITHUB_REF_NAME" \
            --title "Auto PR: $GITHUB_REF_NAME → ${{ steps.parse-json.outputs.base_branch }}" \
            --body "${{ steps.release_notes.outputs.notes }}" \
            --label "auto-pr"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # STEP 8: Append to existing PR if already open
      - name: Append to existing PR
        if: steps.check-diff.outputs.ahead_count != '0' && steps.check-pr.outputs.pr_exists == 'true'
        run: |
          PR_NUM=${{ steps.check-pr.outputs.pr_number }}
          NEW_NOTES="${{ steps.release_notes.outputs.notes }}"

          gh pr edit "$PR_NUM" --body "$NEW_NOTES"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
