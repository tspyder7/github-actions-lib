# Reusable GitHub Actions workflow: Auto PR from based on pr branch hierarchy
# Automatically generates PRs with grouped release notes and appends updates

name: Auto PR Generation

on:
  workflow_call:
    inputs:
      pr-branch-hierarchy-json:
        description: "JSON object defining allowed source branches for each target branch"
        type: string
        required: true

      timeout_minutes:
        type: number
        required: false
        default: 10
        description: Custom Timeout in Minutes

    secrets:
      GH_TOKEN:
        description: "GitHub token with contents:write and pull-requests:write permissions"
        required: true

jobs:
  auto-pr:
    name: Generate PR Automatically
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    timeout-minutes: ${{ inputs.timeout_minutes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup workflow variables
        id: setup
        run: |
          echo "🔍 WORKFLOW DEBUG INFORMATION"
          echo "=================================="
          echo "📋 GitHub Context:"
          echo "  - Repository: $GITHUB_REPOSITORY"
          echo "  - Current Branch: $GITHUB_REF_NAME"
          echo "  - Event: $GITHUB_EVENT_NAME"
          echo "  - Actor: $GITHUB_ACTOR"
          echo "  - Run ID: $GITHUB_RUN_ID"
          echo ""

          # Validate JSON and parse in one step
          echo "🔧 Validating branch hierarchy JSON..."
          if ! echo '${{ inputs.pr-branch-hierarchy-json }}' | jq empty 2>/dev/null; then
            echo "::error::Invalid JSON in pr-branch-hierarchy-json"
            exit 1
          fi
          echo "✅ JSON is valid"
          echo "📝 Branch Hierarchy: $(echo '${{ inputs.pr-branch-hierarchy-json }}' | jq -c .)"
          echo ""

          # Find base branch from hierarchy
          echo "🔍 Finding target base branch..."
          BASE_BRANCH=""
          while read -r key; do
            echo "  Checking parent branch: $key"
            while read -r child; do
              echo "    - Allowed child: $child"
              if [[ "$GITHUB_REF_NAME" =~ ^$child$ ]]; then
                BASE_BRANCH="$key"
                echo "✅ Match found! $GITHUB_REF_NAME → $BASE_BRANCH"
                break 2
              fi
            done < <(echo '${{ inputs.pr-branch-hierarchy-json }}' | jq -r ".[\"$key\"][]")
          done < <(echo '${{ inputs.pr-branch-hierarchy-json }}' | jq -r 'keys[]')

          if [[ -z "$BASE_BRANCH" ]]; then
            echo "::error::Branch $GITHUB_REF_NAME is not allowed to create PRs into any protected branch"
            echo "Available mappings:"
            echo '${{ inputs.pr-branch-hierarchy-json }}' | jq -r 'to_entries[] | "  \(.key) ← \(.value | join(", "))"'
            exit 1
          fi
          echo ""

          # Git repository analysis
          echo "📊 Git Repository Analysis:"
          echo "  - Current HEAD: $(git rev-parse HEAD)"
          echo "  - Current branch: $(git branch --show-current)"
          echo "  - Total local branches: $(git branch | wc -l)"
          echo "  - Last commit: $(git log -1 --pretty=format:'%h - %s (%an, %ar)')"
          echo ""

          # Verify base branch exists
          echo "🔍 Verifying base branch '$BASE_BRANCH'..."
          if ! git ls-remote --exit-code --heads origin "$BASE_BRANCH" &>/dev/null; then
            echo "::error::Base branch '$BASE_BRANCH' does not exist on remote"
            echo "Available remote branches:"
            git ls-remote --heads origin | sed 's/.*refs\/heads\//  - /'
            exit 1
          fi
          echo "✅ Base branch exists on remote"
          echo ""

          # Fetch and analyze commits
          echo "📥 Fetching latest changes..."
          git fetch origin "$BASE_BRANCH" --quiet
          git fetch origin "$GITHUB_REF_NAME" --quiet 2>/dev/null || echo "  (Current branch may not exist on remote yet)"

          echo "📊 Branch Comparison Analysis:"
          echo "  - Current HEAD: $(git rev-parse HEAD)"
          echo "  - Base branch (origin/$BASE_BRANCH): $(git rev-parse origin/$BASE_BRANCH)"
          echo "  - Branches identical: $([[ "$(git rev-parse HEAD)" == "$(git rev-parse origin/$BASE_BRANCH)" ]] && echo 'YES' || echo 'NO')"

          # Count commits in both directions
          AHEAD=$(git rev-list "origin/$BASE_BRANCH..HEAD" --count)
          BEHIND=$(git rev-list "HEAD..origin/$BASE_BRANCH" --count)

          echo "  - Commits ahead of base: $AHEAD"
          echo "  - Commits behind base: $BEHIND"

          # Show commit ranges if they exist
          if [[ $AHEAD -gt 0 ]]; then
            echo ""
            echo "📝 Commits ahead (will be included in PR):"
            git log "origin/$BASE_BRANCH..HEAD" --pretty=format:"  %h - %s (%an)" --reverse
          fi

          if [[ $BEHIND -gt 0 ]]; then
            echo ""
            echo "⚠️  Commits behind (base has newer commits):"
            git log "HEAD..origin/$BASE_BRANCH" --pretty=format:"  %h - %s (%an)" | head -5
            [[ $BEHIND -gt 5 ]] && echo "  ... and $(($BEHIND - 5)) more commits"
          fi

          # Additional diagnostics for edge cases
          if [[ $AHEAD -eq 0 && $BEHIND -eq 0 ]]; then
            echo ""
            echo "🔄 Branches are identical - checking for force push scenarios..."
            TOTAL_COMMITS=$(git rev-list HEAD --count)
            BASE_COMMITS=$(git rev-list "origin/$BASE_BRANCH" --count)
            echo "  - Total commits in HEAD: $TOTAL_COMMITS"
            echo "  - Total commits in base: $BASE_COMMITS"
          fi

          echo ""
          echo "📤 Workflow Outputs:"
          echo "  - base_branch: $BASE_BRANCH"
          echo "  - ahead_count: $AHEAD"
          echo "  - has_commits: $([[ $AHEAD -gt 0 ]] && echo 'true' || echo 'false')"
          echo "=================================="

          echo "base_branch=$BASE_BRANCH" >> $GITHUB_OUTPUT
          echo "ahead_count=$AHEAD" >> $GITHUB_OUTPUT
          echo "has_commits=$([[ $AHEAD -gt 0 ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Ensure auto-pr label exists
        if: steps.setup.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh label list --json name -q '.[] | select(.name == "auto-pr") | .name' | grep -q "auto-pr" || \
          gh label create "auto-pr" --color "34ebba" --description "Automatically generated PR"

      - name: Check for existing PR
        if: steps.setup.outputs.has_commits == 'true'
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --head "$GITHUB_REF_NAME" --base "${{ steps.setup.outputs.base_branch }}" --state open --json number -q '.[0].number // empty')
          echo "number=${PR_NUMBER:-}" >> $GITHUB_OUTPUT
          echo "exists=$([[ -n "$PR_NUMBER" ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Generate release notes
        if: steps.setup.outputs.has_commits == 'true'
        id: release-notes
        run: |
          echo "📝 GENERATING RELEASE NOTES"
          echo "=================================="
          echo "📊 Commit Analysis:"

          declare -A sections=(
            ["feat"]="### ✨ FEATURES"
            ["fix"]="### 🐛 FIXES"
            ["hotfix"]="### 🚑 HOTFIX"
            ["test"]="### 🧪 TESTS"
            ["chore"]="### 🔧 CHORES"
            ["refactor"]="### 🔧 CHORES"
          )

          declare -A content
          declare -A count

          # Initialize counters
          for prefix in feat fix hotfix test chore refactor other; do
            content["$prefix"]=""
            count["$prefix"]=0
          done

          echo "🔍 Processing commits from origin/${{ steps.setup.outputs.base_branch }}..HEAD"

          # Process commits efficiently
          while IFS='~' read -r msg author || [[ -n $msg || -n $author ]]; do
            msg=$(echo "$msg" | xargs)
            author=$(echo "$author" | xargs)

            if [[ -z "$msg" || -z "$author" ]]; then
              echo "  ⚠️  Skipping empty commit: msg='$msg' author='$author'"
              continue
            fi

            echo "  📦 Processing: '$msg' by $author"

            # Extract prefix and categorize
            if [[ "$msg" =~ ^(feat|fix|hotfix|chore|test|refactor): ]]; then
              prefix="${BASH_REMATCH[1]}"
              clean_msg=$(echo "${msg#*: }" | xargs)
              content["$prefix"]+="- $clean_msg ($author)\n"
              ((count["$prefix"] += 1))
              echo "    ✅ Categorized as: $prefix"
            else
              content["other"]+="- $msg ($author)\n"
              ((count["other"] += 1))
              echo "    📋 Categorized as: other"
            fi
          done < <(git log "origin/${{ steps.setup.outputs.base_branch }}..HEAD" --pretty=format:"%s ~ %an")

          echo ""
          echo "📊 Categorization Summary:"
          for prefix in feat fix hotfix chore test refactor other; do
            if [[ ${count["$prefix"]} -gt 0 ]]; then
              echo "  - $prefix: ${count[$prefix]} commits"
            fi
          done

          total_commits=$((${count[feat]} + ${count[fix]} + ${count[hotfix]} + ${count[chore]} + + ${count[test]} + ${count[refactor]} + ${count[other]}))
          echo "  - Total processed: $total_commits commits"
          echo ""

          # Build release notes
          echo "🏗️  Building release notes structure..."
          notes="## RELEASE NOTES\n\n"
          sections_added=0

          for prefix in feat fix hotfix chore refactor; do
            if [[ -n "${content[$prefix]:-}" ]]; then
              notes+="${sections[$prefix]}\n${content[$prefix]}\n"
              ((sections_added += 1))
              echo "  ✅ Added section: $prefix (${count[$prefix]} items)"
            fi
          done

          if [[ -n "${content[other]:-}" ]]; then
            notes+="### 📦 OTHER CHANGES\n${content[other]}\n"
            ((sections_added += 1))
            echo "  ✅ Added section: other (${count[other]} items)"
          fi

          # Fallback if no categorized content
          if [[ $sections_added -eq 0 ]]; then
            echo "  ⚠️  No categorized content found, using fallback..."
            notes+="### 📦 CHANGES\n"
            git log "origin/${{ steps.setup.outputs.base_branch }}..HEAD" --pretty=format:"- %s (%an)" >> /tmp/notes.txt
            notes+="$(cat /tmp/notes.txt)\n"
            echo "  ✅ Added fallback section with all commits"
          fi

          echo ""
          echo "📄 Final Release Notes Preview:"
          echo "=================================="
          echo -e "$notes" | head -20
          [[ $(echo -e "$notes" | wc -l) -gt 20 ]] && echo "... (truncated, full notes will be in PR)"
          echo "=================================="

          # Use proper multiline output
          {
            echo "content<<NOTES_EOF"
            echo -e "$notes"
            echo "NOTES_EOF"
          } >> $GITHUB_OUTPUT

      - name: Create or update PR
        if: steps.setup.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "🚀 PR CREATION/UPDATE"
          echo "=================================="
          echo "📋 PR Details:"
          echo "  - Source: $GITHUB_REF_NAME"
          echo "  - Target: ${{ steps.setup.outputs.base_branch }}"
          echo "  - Commits: ${{ steps.setup.outputs.ahead_count }}"
          echo "  - Existing PR: ${{ steps.check-pr.outputs.exists }}"
          [[ "${{ steps.check-pr.outputs.exists }}" == "true" ]] && echo "  - PR Number: #${{ steps.check-pr.outputs.number }}"
          echo ""

          if [[ "${{ steps.check-pr.outputs.exists }}" == "true" ]]; then
            echo "🔄 Updating existing PR #${{ steps.check-pr.outputs.number }}..."

            # Show current PR details
            echo "📊 Current PR info:"
            gh pr view "${{ steps.check-pr.outputs.number }}" --json title,body,labels,state | jq -r '
              "  - Title: " + .title,
              "  - State: " + .state,
              "  - Labels: " + (.labels | map(.name) | join(", ")),
              "  - Body length: " + (.body | length | tostring) + " chars"
            '

            # Update existing PR
            gh pr edit "${{ steps.check-pr.outputs.number }}" \
              --body "${{ steps.release-notes.outputs.content }}"
            echo "✅ Updated existing PR #${{ steps.check-pr.outputs.number }}"

            # Show updated PR URL
            PR_URL=$(gh pr view "${{ steps.check-pr.outputs.number }}")
            echo "🔗 PR URL: $PR_URL"

          else
            echo "🆕 Creating new PR..."

            # Create new PR and capture the URL
            PR_URL=$(gh pr create \
              --base "${{ steps.setup.outputs.base_branch }}" \
              --head "$GITHUB_REF_NAME" \
              --title "Auto PR: $GITHUB_REF_NAME → ${{ steps.setup.outputs.base_branch }}" \
              --body "${{ steps.release-notes.outputs.content }}" \
              --label "auto-pr")

            echo "✅ Created new PR: $GITHUB_REF_NAME → ${{ steps.setup.outputs.base_branch }}"
            echo "🔗 PR URL: $PR_URL"

            # Extract PR number from URL for reference
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]\+')
          fi

      - name: No changes detected
        if: steps.setup.outputs.has_commits == 'false'
        run: |
          echo "ℹ️  NO CHANGES DETECTED"
          echo "=================================="
          echo "📊 Summary:"
          echo "  - Current branch: $GITHUB_REF_NAME"
          echo "  - Target branch: ${{ steps.setup.outputs.base_branch }}"
          echo "  - Commits ahead: ${{ steps.setup.outputs.ahead_count }}"
          echo "  - Status: No new commits to create PR"
          echo ""
          echo "💡 Possible reasons:"
          echo "  - Branch is up to date with target"
          echo "  - No new commits since last sync"
          echo "  - Branch might be behind target (needs rebase/merge)"
          echo ""
          echo "🔍 To investigate, check:"
          echo "  - git log --oneline ${{ steps.setup.outputs.base_branch }}..HEAD"
          echo "  - git status"
          echo "  - git log --graph --oneline --all"
          echo "==================================")
            echo "📋 PR Number: #$PR_NUMBER"
          fi

          echo "=================================="

      - name: No changes detected
        if: steps.setup.outputs.has_commits == 'false'
        run: echo "No commits ahead of ${{ steps.setup.outputs.base_branch }}. Skipping
          PR creation/update."
