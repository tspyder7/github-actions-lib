name: "npm-publish"
description: "Composite action to publish npm packages using Trusted Publishing"

inputs:
  node-version:
    description: Node.js version to use for setup and publishing
    required: false
    default: "24"

  registry-url:
    description: The npm registry URL where the package will be published
    required: false
    default: https://registry.npmjs.org/

  package-manager:
    description: Package manager to use (pnpm, yarn, or npm)
    required: true

  publish-tag:
    description: Tag the npm package
    required: false
    default: "latest"

  publish-access:
    description: Access level for the published package (public or restricted)
    required: false
    default: "public"

  work-dir:
    description: Directory where commands should run
    required: false
    default: "."

outputs:
  package-name:
    description: "Name of the published package"
    value: ${{ steps.publish-info.outputs.package-name }}

  package-version:
    description: "Version of the published package"
    value: ${{ steps.publish-info.outputs.package-version }}

  published-url:
    description: "URL to the package on npmjs.com"
    value: ${{ steps.publish-info.outputs.published-url }}

runs:
  using: "composite"
  steps:
    - name: Log Details
      shell: bash
      run: |
        echo "📋 Details:"
        echo "  - Trigger: $GITHUB_EVENT_NAME"
        echo "  - Reference: $GITHUB_REF"
        echo "  - SHA: $GITHUB_SHA"
        echo "  - Repository: $GITHUB_REPOSITORY"
        echo "  - Actor: $GITHUB_ACTOR"
        echo "  - Run ID: $GITHUB_RUN_ID"
        echo "⚙️ Configuration:"
        echo "  - Node Version: ${{ inputs.node-version }}"
        echo "  - Package Manager: ${{ inputs.package-manager }}"
        echo "  - Registry URL: ${{ inputs.registry-url }}"
        echo "  - Publish Tag: ${{ inputs.publish-tag }}"
        echo "📁 Working Directory: ${{ inputs.work-dir }}"

    - name: Checkout code
      uses: actions/checkout@v5
      with:
        path: "codespace"
        fetch-depth: 0

    - name: Resolve working directory
      id: resolve-workdir
      shell: bash
      run: |
        REPO_PATH="codespace"
        WORK_DIR="${{ inputs.work-dir }}"

        if [ "$WORK_DIR" = "." ]; then
          FULL_PATH="$REPO_PATH"
        else
          FULL_PATH="$REPO_PATH/$WORK_DIR"
        fi

        echo "📁 Repository contents at $GITHUB_REF:"
        echo "   - repo path:   $REPO_PATH"
        echo "   - work-dir:    $WORK_DIR"
        echo "   - full path:   $FULL_PATH"

        ls -la "$FULL_PATH" || echo "No files found in $FULL_PATH"

        echo "resolved-workdir=$FULL_PATH" >> $GITHUB_OUTPUT

    # STEP 1: Validate package manager
    - name: Validate package manager
      shell: bash
      run: |
        PACKAGE_MANAGER="${{ inputs.package-manager }}"
        echo "🔍 Validating package manager: $PACKAGE_MANAGER"
        case "$PACKAGE_MANAGER" in
          pnpm|yarn|npm)
            echo "✅ Valid package manager: $PACKAGE_MANAGER"
            ;;
          *)
            echo "❌ Invalid package manager: $PACKAGE_MANAGER. Must be one of: pnpm, yarn, npm"
            exit 1
            ;;
        esac

    # STEP 2a: Install pnpm BEFORE setup-node
    - name: Install pnpm
      if: ${{ inputs.package-manager == 'pnpm' }}
      shell: bash
      working-directory: ${{ steps.resolve-workdir.outputs.resolved-workdir }}
      run: |
        # Read packageManager field from package.json
        PKG_MANAGER=$(jq -r '.packageManager // empty' package.json)

        if [ -z "$PKG_MANAGER" ]; then
          echo "❌ No packageManager field found in package.json"
          exit 1
        fi

        echo "📦 Detected packageManager: $PKG_MANAGER"

        # Extract version if format is like "pnpm@8.15.4"
        if [[ "$PKG_MANAGER" =~ ^pnpm@([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
          VERSION="${BASH_REMATCH[1]}"
          echo "⬇️ Installing pnpm@$VERSION..."
          npm install -g "pnpm@$VERSION"
        elif [[ "$PKG_MANAGER" =~ ^pnpm@.+$ ]]; then
          VERSION="${PKG_MANAGER#pnpm@}"
          echo "⬇️ Installing pnpm@$VERSION..."
          npm install -g "pnpm@$VERSION"
        elif [[ "$PKG_MANAGER" == "pnpm" ]]; then
          echo "⬇️ Installing latest pnpm..."
          npm install -g pnpm
        else
          echo "❌ Unsupported packageManager format: $PKG_MANAGER"
          exit 1
        fi

        echo "📦 pnpm setup completed"
        echo "  - pnpm version:        $(pnpm --version)"
        echo "  - pnpm store location: $(pnpm store path)"

    - name: Log pnpm version
      if: ${{ inputs.package-manager == 'pnpm' }}
      shell: bash
      run: |
        echo "📦 pnpm setup completed"
        echo "  - pnpm version:        $(pnpm --version)"
        echo "  - pnpm store location: $(pnpm store path)"

    # STEP 2b: Install yarn BEFORE setup-node
    - name: Install yarn
      if: ${{ inputs.package-manager == 'yarn' }}
      shell: bash
      run: |
        npm install -g yarn
        echo "🧶 yarn setup completed"
        echo "  - yarn version:         $(yarn --version)"
        echo "  - yarn cache directory: $(yarn cache dir)"

    # STEP 3: Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}
        cache: ${{ inputs.package-manager }}
        cache-dependency-path: >-
          ${{ inputs.package-manager == 'pnpm' && format('{0}/pnpm-lock.yaml',
          steps.resolve-workdir.outputs.resolved-workdir) ||
          inputs.package-manager == 'yarn' && format('{0}/yarn.lock',
          steps.resolve-workdir.outputs.resolved-workdir) ||
          format('{0}/package-lock.json',
          steps.resolve-workdir.outputs.resolved-workdir) }}

    - name: Log Node.js setup
      shell: bash
      run: |
        # Update npm version >= 11.5.1 for trusted publishing support
        npm install -g npm@~11.10.0

        echo "⚡ Node.js setup completed"
        echo "  - Node version: $(node --version)"
        echo "  - NPM version:  $(npm --version)"
        echo "  - NPM registry: $(npm config get registry)"

    # STEP 4: Install dependencies
    - name: Install dependencies
      shell: bash
      working-directory: ${{ steps.resolve-workdir.outputs.resolved-workdir }}
      run: |
        PACKAGE_MANAGER="${{ inputs.package-manager }}"

        if [ ! -f package.json ]; then
          echo "❌ No package.json found in $(pwd)!"
          exit 1
        fi

        echo "📦 $(cat package.json | jq -r '.name + " v" + .version')"
        echo "  - dependencies:    $(cat package.json | jq -r '.dependencies // {} | keys | length')"
        echo "  - devDependencies: $(cat package.json | jq -r '.devDependencies // {} | keys | length')"
        echo "📥 Installing with $PACKAGE_MANAGER..."

        if [[ "$PACKAGE_MANAGER" == "pnpm" ]]; then
          pnpm install --frozen-lockfile
        elif [[ "$PACKAGE_MANAGER" == "yarn" ]]; then
          yarn install --frozen-lockfile
        else
          npm ci
        fi

        echo "📊 node_modules size: $(du -sh node_modules 2>/dev/null || echo 'Not found')"

    - name: Log dependency installation results
      shell: bash
      working-directory: ${{ steps.resolve-workdir.outputs.resolved-workdir }}
      run: |
        PACKAGE_MANAGER="${{ inputs.package-manager }}"
        echo "📊 Dependency installation summary:"

        if [[ "$PACKAGE_MANAGER" == "pnpm" ]]; then
          pnpm ls --depth=0 || true
        elif [[ "$PACKAGE_MANAGER" == "yarn" ]]; then
          yarn list --depth=0 || true
        else
          npm ls --depth=0 || true
        fi

    # STEP 5: Build
    - name: Build project
      shell: bash
      working-directory: ${{ steps.resolve-workdir.outputs.resolved-workdir }}
      run: |
        PACKAGE_MANAGER="${{ inputs.package-manager }}"

        if ! cat package.json | jq -e '.scripts.build' > /dev/null 2>&1; then
          echo "⚠️ No build script found, skipping"
          exit 0
        fi

        echo "🔨 Running build..."
        if [[ "$PACKAGE_MANAGER" == "pnpm" ]]; then
          pnpm run build
        elif [[ "$PACKAGE_MANAGER" == "yarn" ]]; then
          yarn build
        else
          npm run build
        fi

    # STEP 6: Publish
    - name: Publish to NPM
      id: publish
      shell: bash
      working-directory: ${{ steps.resolve-workdir.outputs.resolved-workdir }}
      env:
        NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}
      run: |
        PACKAGE_NAME=$(cat package.json | jq -r '.name')
        PACKAGE_VERSION=$(cat package.json | jq -r '.version')
        TAG="${{ inputs.publish-tag }}"
        ACCESS="${{ inputs.publish-access }}"

        echo "📦 Publishing $PACKAGE_NAME@$PACKAGE_VERSION"
        echo "  - tag:    $TAG"
        echo "  - access: $ACCESS"

        npm publish --access "$ACCESS" --provenance --tag "$TAG"

    - name: Set publish outputs
      id: publish-info
      if: success()
      shell: bash
      working-directory: ${{ steps.resolve-workdir.outputs.resolved-workdir }}
      run: |
        PACKAGE_NAME=$(cat package.json | jq -r '.name')
        PACKAGE_VERSION=$(cat package.json | jq -r '.version')
        echo "package-name=${PACKAGE_NAME}"       >> $GITHUB_OUTPUT
        echo "package-version=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT
        echo "published-url=https://www.npmjs.com/package/${PACKAGE_NAME}" >> $GITHUB_OUTPUT

    - name: Log failure details
      if: failure()
      shell: bash
      working-directory: ${{ steps.resolve-workdir.outputs.resolved-workdir }}
      run: |
        echo "❌ Workflow failed!"
        echo "  - Working directory contents:"
        ls -la || true
        echo "  - Node version: $(node --version)"
        echo "  - npm version:  $(npm --version)"
        if [[ "${{ inputs.package-manager }}" == "pnpm" ]]; then
          echo "  - pnpm version: $(pnpm --version || echo 'not found')"
        fi
